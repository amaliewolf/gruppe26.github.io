<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huset</title>
    <link rel="stylesheet" href="huset.css">
</head>

<script>
const DEVICE = 'AU_STUDENT1';
const SERVER_URL = 'https://iot-paia-production.up.railway.app';
const BASE = SERVER_URL + '/api/env-sensors/' + DEVICE;

function fmt(v, dec = 1) {
return v != null ? Number(v).toFixed(dec) : '—';
}

function opdaterKort(d) {
const tempEl = document.getElementById('temperature_c');
const humEl = document.getElementById('humidity_pct');

if (tempEl) tempEl.textContent = fmt(d.temperature_c, 1);
if (humEl) humEl.textContent = fmt(d.humidity_pct, 1);
}

function forbindSSE() {
const es = new EventSource(BASE + '/stream');

es.onmessage = (event) => {
try {
opdaterKort(JSON.parse(event.data));
} catch {
console.log('Kunne ikke læse data');
}
};

es.onerror = () => {
es.close();
setTimeout(forbindSSE, 5000);
};
}

forbindSSE();
</script>

<body>

    <main class="app">

        <h1>Dit hjem har det:</h1>
        <p class="status">Behageligt!</p>

        <section class="hus-side">

            <!-- Boks med målinger -->
            <div class="maalinger-boks">
                <h2>Live målinger inde i huset:</h2>
                <p>Temperatur: <span id="temperature_c">—</span></p>
                
                <p>Luftfugtighed: <span id="humidity_pct">—</span></p>
            </div>

            <!-- Stort hus -->
            <div class="hus-illustration">
                <div class="stor-hus">
                    <img src="familie.png" alt="Familie" class="familie-i-hus">
                </div>
            </div>

        </section>

        <!-- Menu nederst -->
        <nav class="menu">
            <a href="forside.html" class="menu-knap">
                <img src="familie.png" alt="Familie">
            </a>

            <a href="huset.html" class="menu-knap active">
                <img src="hus5.png" alt="Hjem">
            </a>
        </nav>

    </main>

</body>
</html>
